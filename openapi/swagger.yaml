openapi: 3.1.0
info:
  title: Manifest Service
  description: 'A microservice that facilitates manifest creation and retrieval.


    Code is available on [GitHub](https://github.com/uc-cdis/manifestservice).'
  contact:
    name: CTDS UChicago
    email: cdis@uchicago.edu
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.5.5
paths:
  /:
    get:
      tags:
      - manifests
      summary: List user's manifests
      description: 'Returns a list of filenames corresponding to the user''s manifests.


        The appropriate folder is determined from the user''s JWT claims (sub field).'
      operationId: get_manifests__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestListResponse'
      security:
      - HTTPBearer: []
    put:
      tags:
      - manifests
      summary: Add manifest to S3 bucket
      description: 'Add manifest to S3 bucket.


        The manifest format must be a list of objects, where each object contains

        at least an "object_id" key.


        Example request body:

        ```json

        [{"object_id": "dg.1234/abc-def-123", "subject_id": "patient_001"}]

        ```'
      operationId: put_manifest__put
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ManifestRecord'
              type: array
              title: Manifest Json
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
    post:
      tags:
      - manifests
      summary: Add manifest to S3 bucket
      description: 'Add manifest to S3 bucket.


        The manifest format must be a list of objects, where each object contains

        at least an "object_id" key.


        Example request body:

        ```json

        [{"object_id": "dg.1234/abc-def-123", "subject_id": "patient_001"}]

        ```'
      operationId: put_manifest__post
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ManifestRecord'
              type: array
              title: Manifest Json
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /file/{file_name}:
    get:
      tags:
      - manifests
      summary: Get manifest file contents
      description: 'Returns the requested manifest file from the user''s folder.


        The file_name argument should be of the form "manifest-timestamp.json".

        The user folder prefix is determined from JWT claims.'
      operationId: get_manifest_file_file__file_name__get
      security:
      - HTTPBearer: []
      parameters:
      - name: file_name
        in: path
        required: true
        schema:
          type: string
          title: File Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /cohorts:
    get:
      tags:
      - cohorts
      summary: List user's cohorts
      description: 'Returns a list of GUIDs corresponding to the user''s exported
        PFBs.


        The appropriate folder is determined from the user''s JWT claims (sub field).'
      operationId: get_cohorts_cohorts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortListResponse'
      security:
      - HTTPBearer: []
    put:
      tags:
      - cohorts
      summary: Add PFB GUID to S3 bucket
      description: 'Add PFB GUID to S3 bucket.


        Creates a file named with the GUID value in the user''s cohorts/ folder.


        Example request body:

        ```json

        {"guid": "5183a350-9d56-4084-8a03-6471cafeb7fe"}

        ```'
      operationId: put_pfb_guid_cohorts_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohortCreateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
    post:
      tags:
      - cohorts
      summary: Add PFB GUID to S3 bucket
      description: 'Add PFB GUID to S3 bucket.


        Creates a file named with the GUID value in the user''s cohorts/ folder.


        Example request body:

        ```json

        {"guid": "5183a350-9d56-4084-8a03-6471cafeb7fe"}

        ```'
      operationId: put_pfb_guid_cohorts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CohortCreateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /metadata:
    get:
      tags:
      - metadata
      summary: List user's metadata files
      description: List all exported metadata files associated with user.
      operationId: get_metadata_metadata_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataListResponse'
      security:
      - HTTPBearer: []
    put:
      tags:
      - metadata
      summary: Create metadata export file
      description: Create an exported metadata file.
      operationId: put_metadata_metadata_put
      requestBody:
        content:
          application/json:
            schema:
              items:
                additionalProperties: true
                type: object
              type: array
              title: Metadata Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
    post:
      tags:
      - metadata
      summary: Create metadata export file
      description: Create an exported metadata file.
      operationId: put_metadata_metadata_post
      requestBody:
        content:
          application/json:
            schema:
              items:
                additionalProperties: true
                type: object
              type: array
              title: Metadata Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilenameResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /metadata/{file_name}:
    get:
      tags:
      - metadata
      summary: Get metadata file contents
      description: Retrieve a specific exported metadata file by filename.
      operationId: get_metadata_file_metadata__file_name__get
      security:
      - HTTPBearer: []
      parameters:
      - name: file_name
        in: path
        required: true
        schema:
          type: string
          title: File Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /_status:
    get:
      tags:
      - system
      summary: Health check
      description: Health check endpoint
      operationId: health_check__status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
components:
  schemas:
    CohortCreateRequest:
      properties:
        guid:
          type: string
          title: Guid
          description: PFB GUID to store as a cohort
          examples:
          - 5183a350-9d56-4084-8a03-6471cafeb7fe
      type: object
      required:
      - guid
      title: CohortCreateRequest
      description: 'Request body for PUT/POST /cohorts.


        Replaces the manual `_is_valid_guid()` validation helper.

        The GUID is validated via a field_validator to match UUID format

        (with optional prefix).'
    CohortListResponse:
      properties:
        cohorts:
          items:
            $ref: '#/components/schemas/FileItem'
          type: array
          title: Cohorts
      type: object
      required:
      - cohorts
      title: CohortListResponse
      description: "Response for GET /cohorts \u2014 list of user's cohort GUIDs."
    FileItem:
      properties:
        filename:
          type: string
          title: Filename
          examples:
          - manifest-2024-01-15T10-30-00.json
        last_modified:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Modified
          examples:
          - '2024-01-15 10:30:00'
        last_modified_timestamp:
          anyOf:
          - type: number
          - type: 'null'
          title: Last Modified Timestamp
      type: object
      required:
      - filename
      title: FileItem
      description: A single file entry as returned by S3 listing.
    FilenameResponse:
      properties:
        filename:
          type: string
          title: Filename
          examples:
          - manifest-2024-01-15T10-30-00.json
      type: object
      required:
      - filename
      title: FilenameResponse
      description: Response returned when a file is created (PUT/POST endpoints).
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthCheckResponse:
      properties:
        status:
          type: string
          title: Status
          examples:
          - Healthy
      type: object
      required:
      - status
      title: HealthCheckResponse
      description: Response for the /_status health check endpoint.
    ManifestListResponse:
      properties:
        manifests:
          items:
            $ref: '#/components/schemas/FileItem'
          type: array
          title: Manifests
      type: object
      required:
      - manifests
      title: ManifestListResponse
      description: "Response for GET / \u2014 list of user's manifest files."
    ManifestRecord:
      properties:
        object_id:
          type: string
          title: Object Id
          description: DRS object identifier
          examples:
          - dg.1234/abc-def-123
      additionalProperties: true
      type: object
      required:
      - object_id
      title: ManifestRecord
      description: 'A single record within a manifest upload.


        Each record must contain at least an `object_id` key.

        Additional keys (subject_id, etc.) are preserved via extra="allow".'
    MetadataListResponse:
      properties:
        external_file_metadata:
          items:
            $ref: '#/components/schemas/FileItem'
          type: array
          title: External File Metadata
      type: object
      required:
      - external_file_metadata
      title: MetadataListResponse
      description: "Response for GET /metadata \u2014 list of exported metadata files."
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
tags:
- name: manifests
  description: Operations for managing user manifest files (lists of object IDs).
- name: cohorts
  description: Operations for managing cohort exports (PFB GUIDs).
- name: metadata
  description: Operations for managing exported metadata files.
- name: system
  description: System health and status endpoints.
